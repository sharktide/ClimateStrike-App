<!--
    Add this <script> block to your wwwroot/index.html (or MauiProgram's WebView setup)
    so that RegionAutofillService can call window.strikeGetLocation via JS interop.
-->
<script>
    window.strikeGetLocation = () => new Promise((resolve, reject) => {
        if (!navigator.geolocation) { reject("no-geo"); return; }
        navigator.geolocation.getCurrentPosition(
            p => resolve([p.coords.latitude, p.coords.longitude]),
            e => reject(e.message),
            { timeout: 8000, maximumAge: 60000 }
        );
    });
</script>
